<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="referrer" content="no-referrer">
  <title>Плеер</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    iframe { border: 0; width: 100vw; height: 100vh; display: block; }
    .msg {
      color: #ddd; font-family: system-ui, sans-serif; text-align: center;
      padding: 24vh 16px; font-size: 16px;
    }
    .spinner {
      width: 42px; height: 42px; margin: 22vh auto 14px; border-radius: 50%;
      border: 4px solid #333; border-top-color: #7aa2f7; animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!--
    Kodik-плеер работает только внутри iframe, поэтому кнопка «Смотреть» ведёт сюда.
    Ссылка на embed передаётся в hash: .../index.html#https://kodikplayer.com/serial/.../720p
    Hash не уходит на сервер — страница остаётся статичной (подходит для GitHub Pages).

    Реклама: вырезать баннеры/преролл внутри iframe нельзя — это чужой origin (Kodik),
    same-origin policy запрещает доступ к его DOM. Но sandbox ниже БЕЗ allow-popups и
    allow-top-navigation глушит главное зло — попапы/попандеры и редиректы по клику.
  -->
  <div id="root" class="msg"><div class="spinner"></div>Загрузка плеера…</div>
  <script>
    (function () {
      var raw = decodeURIComponent(location.hash.slice(1) || "");
      var root = document.getElementById("root");
      // Разрешаем только ссылки на сам Kodik-плеер — защита от подстановки чужого src.
      if (!/^https?:\/\/[a-z0-9.-]*kodik[a-z0-9.-]*\//i.test(raw)) {
        root.textContent = "Ссылка на плеер не передана или некорректна.";
        return;
      }
      var iframe = document.createElement("iframe");
      iframe.src = raw;
      iframe.setAttribute("allowfullscreen", "");
      iframe.setAttribute("referrerpolicy", "no-referrer");
      iframe.setAttribute("allow", "autoplay; fullscreen; encrypted-media; picture-in-picture");
      // No allow-popups / allow-top-navigation -> ad pop-unders and click-redirects
      // are blocked. allow-same-origin + allow-scripts keep the player itself working.
      iframe.setAttribute(
        "sandbox",
        "allow-scripts allow-same-origin allow-presentation allow-forms allow-modals"
      );
      root.replaceWith(iframe);
    })();
  </script>
</body>
</html>
